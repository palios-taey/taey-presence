<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>taey-presence-engine — demo</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 4rem auto; }
    #wrap { position: relative; }
    textarea { width: 100%; height: 5rem; font-size: 1rem; padding: .6rem; }
    .ghost { color: #999; opacity: .6; min-height: 1.4rem; font-style: italic; }
    .ghost.pivot { filter: blur(3px); opacity: .2; }
    .ghost .omg { margin-left: .5rem; cursor: pointer; color: #2a7; border: 1px solid #2a7;
                  border-radius: 4px; padding: 0 .4rem; font-style: normal; }
    .interrupt { display: none; margin-top: .6rem; padding: .6rem; border: 1px dashed #79b;
                 border-radius: 6px; background: #eef5fb; }
    .interrupt.visible { display: block; }
    .interrupt.certain { border-style: solid; }
  </style>
</head>
<body>
  <h1><span id="face" style="font-size:1.4em">🙂</span> taey-presence</h1>
  <p>Type. The face reflects runtime state + reaction; the engine predicts
     (ghost text + OMG) and may interrupt if confused or has something urgent.</p>
  <div id="wrap">
    <textarea id="input" placeholder="start typing..."></textarea>
    <div id="ghost" class="ghost"></div>
    <div id="interrupt" class="interrupt"><span id="interrupt-text"></span></div>
  </div>

  <script>
    // Posts partial input to /push and polls /state. Served by dashboard/server.py,
    // which bridges these to the Redis keys the presence engine + soma daemon use.
    const input = document.getElementById('input');
    const ghost = document.getElementById('ghost');
    const interrupt = document.getElementById('interrupt');
    const interruptText = document.getElementById('interrupt-text');
    const face = document.getElementById('face');

    let t = null;
    input.addEventListener('input', () => {
      clearTimeout(t);
      t = setTimeout(() => push(input.value), 400);
    });

    async function push(partial) {
      await fetch('/push', { method: 'POST', headers: {'Content-Type': 'application/json'},
                             body: JSON.stringify({ partial }) });
    }

    async function poll() {
      try {
        const r = await fetch('/state');
        const d = await r.json();
        if (d.prediction && d.prediction.prediction) {
          ghost.textContent = d.prediction.prediction;
          ghost.className = 'ghost' + (d.prediction.pivot ? ' pivot' : '');
          if (d.prediction.ghost_active) {
            const b = document.createElement('span');
            b.className = 'omg'; b.textContent = 'OMG';
            b.onclick = () => { input.value = d.prediction.prediction; ghost.textContent = ''; };
            ghost.appendChild(b);
          }
        } else { ghost.textContent = ''; }

        if (d.interrupt && d.interrupt.worthy) {
          interruptText.textContent = d.interrupt.text;
          interrupt.className = 'interrupt visible' + (d.interrupt.confidence > 0.85 ? ' certain' : '');
        } else { interrupt.className = 'interrupt'; }

        if (d.face && d.face.face) { face.textContent = d.face.face; }
      } catch (e) { /* engine not up yet */ }
      setTimeout(poll, 600);
    }
    poll();
  </script>
</body>
</html>
