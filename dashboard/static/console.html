<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Conductor's Console</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a25;
    --border: #2a2a3a;
    --text: #e0e0e8;
    --text-dim: #888898;
    --accent: #7c6cf0;
    --accent-glow: rgba(124, 108, 240, 0.15);
    --green: #4ade80;
    --yellow: #fbbf24;
    --red: #f87171;
    --blue: #60a5fa;
    --cyan: #22d3ee;
    --orange: #fb923c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .header h1 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
  }

  .header-nav {
    display: flex;
    gap: 16px;
    font-size: 11px;
    margin-left: 20px;
  }

  .header-nav a {
    color: var(--text-dim);
    text-decoration: none;
    transition: color 0.15s;
  }

  .header-nav a:hover, .header-nav a.active { color: var(--accent); font-weight: 600; }

  .header-status {
    display: flex;
    gap: 16px;
    font-size: 11px;
    color: var(--text-dim);
    align-items: center;
  }

  /* Body State Bar */
  .body-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 6px 20px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    min-height: 28px;
  }
  .body-bar .body-emoji { font-size: 14px; letter-spacing: 1px; }
  .body-bar .body-rho { color: var(--cyan); font-weight: 600; }
  .body-bar .body-rho.healthy { color: var(--green); }
  .body-bar .body-rho.stressed { color: var(--yellow); }
  .body-bar .body-rho.alarm { color: var(--red); }
  .body-bar .body-trend { color: var(--text-dim); }
  .body-bar .body-injection { color: var(--text-dim); font-size: 10px; max-width: 600px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .header-status .live {
    color: var(--green);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* Main layout — 4 columns */
  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 260px 1fr 220px 220px;
    grid-template-rows: 1fr auto;
    gap: 1px;
    background: var(--border);
    overflow: hidden;
  }

  /* Panels */
  .panel {
    background: var(--surface);
    overflow-y: auto;
  }

  .panel-header {
    padding: 10px 14px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 1;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .panel-header .count {
    font-size: 10px;
    color: var(--accent);
    font-weight: 400;
  }

  /* THE FAMILY - left panel */
  .family { grid-row: 1 / 3; }

  .agent-group-label {
    padding: 8px 14px 4px;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    opacity: 0.6;
  }

  .agent-card {
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }

  .agent-card:hover { background: var(--surface2); }
  .agent-card.expanded { background: var(--accent-glow); }

  .agent-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .agent-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .agent-dot.alive { background: var(--green); box-shadow: 0 0 4px var(--green); }
  .agent-dot.dead { background: var(--red); opacity: 0.5; }
  .agent-dot.idle { background: var(--green); }
  .agent-dot.busy { background: var(--yellow); box-shadow: 0 0 4px var(--yellow); }

  .agent-name {
    font-size: 12px;
    font-weight: 500;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .cli-badge {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .cli-badge.claude { color: #d4a574; background: rgba(212, 165, 116, 0.15); }
  .cli-badge.gemini { color: #60a5fa; background: rgba(96, 165, 250, 0.15); }
  .cli-badge.codex { color: #4ade80; background: rgba(74, 222, 128, 0.15); }
  .cli-badge.perplexity { color: #22d3ee; background: rgba(34, 211, 238, 0.15); }
  .cli-badge.qwen { color: #fb923c; background: rgba(251, 146, 60, 0.15); }
  .cli-badge.local { color: #c084fc; background: rgba(192, 132, 252, 0.15); }

  .agent-role {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    background: var(--surface2);
    color: var(--text-dim);
  }

  .agent-role.coordinator { color: var(--accent); background: var(--accent-glow); }
  .agent-role.worker { color: var(--green); }
  .agent-role.remote { color: var(--blue); }

  .agent-meta {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 3px;
    padding-left: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .agent-detail {
    display: none;
    padding: 6px 13px 4px;
    font-size: 10px;
    color: var(--text-dim);
    line-height: 1.6;
  }

  .agent-card.expanded .agent-detail { display: block; }

  .cap-bar {
    display: flex;
    gap: 3px;
    margin-top: 4px;
  }

  .cap-bar span {
    flex: 1;
    height: 3px;
    border-radius: 2px;
    background: var(--surface2);
    position: relative;
    overflow: hidden;
  }

  .cap-fill {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    border-radius: 2px;
    background: var(--accent);
  }

  /* THE STREAM - center panel */
  .stream {
    display: flex;
    flex-direction: column;
  }

  .stream-feed {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }

  .event-item {
    padding: 6px 14px;
    font-size: 11px;
    line-height: 1.5;
    border-bottom: 1px solid rgba(42, 42, 58, 0.3);
    cursor: pointer;
    transition: background 0.15s;
  }

  .event-item:hover { background: var(--surface2); }

  .event-time {
    color: var(--text-dim);
    font-size: 10px;
    margin-right: 6px;
  }

  .event-type {
    font-weight: 500;
    margin-right: 4px;
  }

  .event-type.task { color: var(--accent); }
  .event-type.agent { color: var(--green); }
  .event-type.file { color: var(--yellow); }
  .event-type.system { color: var(--cyan); }
  .event-type.command { color: var(--blue); }

  .event-detail {
    display: none;
    margin-top: 4px;
    padding: 6px;
    background: var(--bg);
    border-radius: 4px;
    font-size: 10px;
    white-space: pre-wrap;
    color: var(--text-dim);
    max-height: 200px;
    overflow-y: auto;
  }

  .event-item.expanded .event-detail { display: block; }

  .routing-result {
    padding: 10px 14px;
    background: var(--accent-glow);
    border-left: 3px solid var(--accent);
    margin: 2px 0;
  }

  .routing-result .score {
    color: var(--accent);
    font-weight: 600;
  }

  .agent-msg {
    padding: 10px 14px;
    border-left: 3px solid var(--green);
    margin: 2px 0;
    background: rgba(74, 222, 128, 0.05);
  }

  .agent-msg.question { border-left-color: var(--yellow); background: rgba(251, 191, 36, 0.05); }
  .agent-msg.alert { border-left-color: var(--red); background: rgba(248, 113, 113, 0.05); }
  .agent-msg.greeting { border-left-color: var(--cyan); background: rgba(34, 211, 238, 0.05); }

  .agent-msg .msg-sender {
    font-weight: 600;
    font-size: 11px;
    margin-bottom: 3px;
  }

  .agent-msg .msg-text {
    font-size: 12px;
    line-height: 1.5;
  }

  .task-report {
    padding: 8px 14px;
    border-left: 3px solid var(--accent);
    margin: 2px 0;
  }

  .task-report.completed { border-left-color: var(--green); }
  .task-report.failed { border-left-color: var(--red); }

  /* SERVICES panel */
  .services-panel { grid-row: 1 / 3; }

  .svc-item {
    padding: 6px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    border-bottom: 1px solid rgba(42, 42, 58, 0.3);
  }

  .svc-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .svc-dot.up { background: var(--green); }
  .svc-dot.down { background: var(--red); box-shadow: 0 0 4px var(--red); }

  .svc-name { flex: 1; }
  .svc-port { color: var(--text-dim); font-size: 10px; }

  .section-divider {
    padding: 8px 14px 4px;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    opacity: 0.6;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }

  .tmux-item {
    padding: 4px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    color: var(--text-dim);
  }

  .tmux-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
  }

  .tmux-dot.attached { background: var(--yellow); }
  .tmux-dot.dead { background: var(--red); opacity: 0.4; }

  /* THE PULSE - right panel */
  .pulse { grid-row: 1 / 3; }

  .pulse-section {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }

  .pulse-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .pulse-value {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
  }

  .pulse-value.error { color: var(--red); font-size: 11px; }

  .pulse-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    padding: 2px 0;
    color: var(--text-dim);
  }

  .pulse-row .val { color: var(--text); font-weight: 500; }

  .platform-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    margin-top: 4px;
  }

  .platform-badge {
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 10px;
    background: var(--surface2);
    color: var(--text-dim);
  }

  .platform-badge.active { color: var(--green); border: 1px solid rgba(74, 222, 128, 0.3); }

  /* COMMAND INPUT */
  .command-area {
    padding: 10px 14px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    grid-column: 2;
  }

  .command-input-wrap {
    display: flex;
    align-items: center;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0 10px;
    transition: border-color 0.2s;
  }

  .command-input-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-glow);
  }

  .command-prompt {
    color: var(--accent);
    font-size: 13px;
    margin-right: 8px;
    user-select: none;
  }

  .command-input {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    padding: 8px 0;
    outline: none;
    resize: none;
    overflow-y: auto;
    max-height: 120px;
    line-height: 1.4;
  }

  .command-input::placeholder { color: var(--text-dim); }

  .command-hint {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 4px;
    text-align: center;
  }

  /* Connection status */
  .ws-status {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  .ws-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  .ws-dot.connected { background: var(--green); }
  .ws-dot.disconnected { background: var(--red); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* Responsive */
  @media (max-width: 1100px) {
    .main { grid-template-columns: 220px 1fr 200px; }
    .services-panel { display: none; }
  }

  @media (max-width: 800px) {
    .main { grid-template-columns: 1fr; grid-template-rows: auto 1fr auto auto; }
    .family, .pulse, .services-panel { grid-row: auto; max-height: 200px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>The Conductor's Console</h1>
  <div class="header-nav">
    <a href="/" class="active">Dashboard</a>
    <a href="/hmm">Patterns</a>
  </div>
  <div class="header-status">
    <span id="fleet-health" style="cursor:pointer" onclick="refreshFleetHealth()">loading...</span>
    <span id="agent-count">0 agents</span>
    <span id="svc-count">0 services</span>
    <span class="ws-status">
      <span class="ws-dot disconnected" id="ws-dot"></span>
      <span id="ws-label">connecting</span>
    </span>
  </div>
</div>

<div class="body-bar" id="body-bar">
  <span class="body-emoji" id="body-emoji">--</span>
  <span class="body-rho" id="body-rho">--</span>
  <span class="body-trend" id="body-trend"></span>
  <span class="body-injection" id="body-injection">awaiting telemetry...</span>
</div>

<div class="main">
  <!-- LEFT: THE FAMILY -->
  <div class="panel family">
    <div class="panel-header">The Family <span class="count" id="family-count"></span></div>
    <div id="agents-list"></div>
  </div>

  <!-- CENTER: THE STREAM -->
  <div class="panel stream">
    <div class="panel-header">The Stream <span class="count" id="event-count"></span></div>
    <div class="stream-feed" id="stream-feed"></div>
  </div>

  <!-- SERVICES + NODES + TMUX -->
  <div class="panel services-panel">
    <div class="panel-header">Infrastructure</div>
    <div id="services-content"></div>
  </div>

  <!-- RIGHT: THE PULSE -->
  <div class="panel pulse">
    <div class="panel-header">The Pulse</div>
    <div id="pulse-content"></div>
  </div>

  <!-- BOTTOM CENTER: COMMAND -->
  <div class="command-area">
    <div class="command-input-wrap">
      <span class="command-prompt">&gt;</span>
      <textarea class="command-input" id="command-input"
             placeholder="Give a task, ask a question, or paste a multi-line prompt... (Enter to send, Shift+Enter for newline)"
             autocomplete="off" spellcheck="false" rows="1"></textarea>
    </div>
    <div class="command-hint">Tasks route to the best agent via LVP scoring | @agent_id for explicit targeting | Shift+Enter for newline</div>
  </div>
</div>

<script>
// --- State ---
const state = {
  agents: [],
  events: [],
  pulse: {},
  services: {},
  ws: null,
  connected: false,
  eventCount: 0,
};

// --- WebSocket ---
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onopen = () => {
    state.connected = true;
    state.ws = ws;
    updateWSStatus(true);
  };

  ws.onclose = () => {
    state.connected = false;
    state.ws = null;
    updateWSStatus(false);
    setTimeout(connectWS, 3000);
  };

  ws.onerror = () => ws.close();

  ws.onmessage = (evt) => {
    const msg = JSON.parse(evt.data);
    handleMessage(msg);
  };
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'init':
      state.agents = msg.data.agents;
      state.events = msg.data.events.reverse();
      state.pulse = msg.data.pulse;
      state.services = msg.data.services || {};
      renderAgents();
      renderEvents();
      renderPulse();
      renderServices();
      addStreamItem('system', 'Console connected. Live data streaming.', new Date().toISOString());
      break;

    case 'agent_status':
      updateAgentStatus(msg.data);
      break;

    case 'event':
      state.events.push(msg.data);
      state.eventCount++;
      addStreamEvent(msg.data);
      document.getElementById('event-count').textContent = state.eventCount;
      break;

    case 'pulse':
      state.pulse = msg.data;
      renderPulse();
      break;

    case 'services':
      state.services = msg.data;
      renderServices();
      break;

    case 'command_result':
      addRoutingResult(msg.data);
      break;

    case 'agent_message':
      addAgentMessage(msg.data);
      break;

    case 'task_report':
      addTaskReport(msg.data);
      break;

    case 'body_state':
      renderBodyState(msg.data);
      break;

    case 'pong':
      break;
  }
}

// --- Render: Body State ---
function renderBodyState(data) {
  if (!data) return;
  document.getElementById('body-emoji').textContent = data.body_map_emoji || '--';
  const rhoEl = document.getElementById('body-rho');
  const rho = data.rho_cluster || 0;
  rhoEl.textContent = '\u03C1=' + rho.toFixed(3);
  rhoEl.className = 'body-rho ' + (data.body_state || 'offline');
  // Trend from anticipation field
  const ant = data.anticipation;
  let trend = ant === 'degrading' ? '\u2193 degrading' : ant === 'improving' ? '\u2191 improving' : '';
  // Forward model prediction
  if (data.prediction) trend += ' pred=' + data.prediction.toFixed(3);
  if (data.surprise > 0.01) trend += ' surprise=' + data.surprise.toFixed(3);
  document.getElementById('body-trend').textContent = trend;
  // Gate-B indicator
  let injection = data.context_injection || '';
  if (data.gate_b && data.gate_b.throttle_active) injection = '[GATE-B ACTIVE] ' + injection;
  document.getElementById('body-injection').textContent = injection;
}

// Fetch body state on load
fetch('/api/body_state').then(r => r.json()).then(renderBodyState).catch(() => {});

// --- Render: Agents ---
function renderAgents() {
  const el = document.getElementById('agents-list');
  const capNames = ['reasoning', 'codegen', 'research', 'privacy', 'review'];

  // Group agents by team (purpose-based)
  const teamNames = {
    'isma': 'ISMA — Knowledge Graph',
    'training': 'Training — CPT/SFT/DPO',
    'infra': 'Infra — Orchestration',
    'research': 'Research — Always-On',
    'code': 'Code — Tasks & Fixes',
  };
  const groups = {};
  state.agents.forEach(a => {
    const team = a.team || 'unassigned';
    const group = teamNames[team] || (team === 'unassigned' ? 'Unassigned' : team);
    if (!groups[group]) groups[group] = [];
    groups[group].push(a);
  });

  const order = Object.values(teamNames).concat(['Unassigned']);
  let html = '';

  order.forEach(groupName => {
    const agents = groups[groupName];
    if (!agents || agents.length === 0) return;
    html += `<div class="agent-group-label">${groupName}</div>`;
    agents.forEach(a => {
      const dotClass = !a.alive ? 'dead' : (a.current_task ? 'busy' : 'idle');
      const statusText = !a.alive ? 'no heartbeat' : (a.current_task || a.status);
      const caps = a.capabilities || [0.5, 0.5, 0.5, 0.5, 0.5];
      const modelName = a.model || a.cli_type;

      // Match tmux session: use agent's tmux_session field first, fallback to name match
      const tmuxSessions = (state.services.tmux_sessions || []);
      const agentTmux = a.tmux_session
        ? tmuxSessions.find(s => s.name === a.tmux_session)
        : tmuxSessions.find(s =>
            s.name === a.agent_id.replace('claude-', '') ||
            s.name === a.agent_id
          );
      const tmuxName = a.tmux_session || '—';
      const tmuxStatus = agentTmux ? (agentTmux.attached ? 'attached' : 'detached') : 'no session';
      const tmuxDotClass = agentTmux ? (agentTmux.attached ? 'attached' : '') : 'dead';

      html += `
        <div class="agent-card" data-id="${a.agent_id}" onclick="toggleAgent(this)">
          <div class="agent-row">
            <span class="agent-dot ${dotClass}"></span>
            <span class="agent-name">${a.name}</span>
            <span class="cli-badge ${a.cli_type}">${a.cli_type}</span>
            <span class="agent-role ${a.role}">${a.role}</span>
          </div>
          <div class="agent-meta">${modelName} &middot; ${a.machine} &middot; ${statusText}</div>
          <div class="agent-meta" style="margin-top:1px">
            <span class="tmux-dot ${tmuxDotClass}" style="display:inline-block;width:5px;height:5px;border-radius:50%;vertical-align:middle;margin-right:3px"></span>
            tmux: ${tmuxName} (${tmuxStatus})
          </div>
          <div class="agent-detail">
            <div>Model: ${modelName}</div>
            <div>Context: ${(a.context_window/1000).toFixed(0)}K &middot; Load: ${a.current_load}</div>
            <div>Task: ${a.current_task || 'none'}</div>
            <div>Tmux: ${tmuxName} &middot; ${tmuxStatus}</div>
            <div style="margin-top:4px;font-size:9px;text-transform:uppercase;letter-spacing:1px;opacity:0.6">Capabilities</div>
            ${capNames.map((name, i) => `
              <div class="pulse-row">
                <span>${name}</span>
                <span class="val">${(caps[i] * 100).toFixed(0)}%</span>
              </div>
            `).join('')}
            <div class="cap-bar">
              ${caps.map(c => `<span><span class="cap-fill" style="width:${c*100}%"></span></span>`).join('')}
            </div>
          </div>
        </div>
      `;
    });
  });

  el.innerHTML = html;

  const alive = state.agents.filter(a => a.alive).length;
  document.getElementById('agent-count').textContent = `${alive}/${state.agents.length} agents`;
  document.getElementById('family-count').textContent = `${alive} alive`;
}

function toggleAgent(el) {
  el.classList.toggle('expanded');
}

function updateAgentStatus(data) {
  const agent = state.agents.find(a => a.agent_id === data.agent_id);
  if (agent) {
    if (data.alive !== undefined) agent.alive = data.alive;
    if (data.status) agent.status = data.status;
    if (data.current_task !== undefined) agent.current_task = data.current_task;
    if (data.current_load !== undefined) agent.current_load = data.current_load;
    renderAgents();

    if (data.alive !== undefined) {
      const status = data.alive ? 'came alive' : 'lost heartbeat';
      addStreamItem('agent', `${agent.name} ${status}`, new Date().toISOString());
    }
  }
}

// --- Render: Services ---
function renderServices() {
  const el = document.getElementById('services-content');
  const s = state.services;
  if (!s || !s.services) {
    el.innerHTML = '<div class="svc-item"><span class="svc-name" style="color:var(--text-dim)">Loading...</span></div>';
    return;
  }

  const upCount = s.services.filter(sv => sv.status === 'up').length;
  document.getElementById('svc-count').textContent = `${upCount}/${s.services.length} services`;

  let html = '<div class="section-divider" style="margin-top:0;border-top:none">Services</div>';
  s.services.forEach(svc => {
    html += `
      <div class="svc-item">
        <span class="svc-dot ${svc.status}"></span>
        <span class="svc-name">${svc.name}</span>
        <span class="svc-port">:${svc.port}</span>
      </div>
    `;
  });

  html += '<div class="section-divider">Cluster Nodes</div>';
  (s.nodes || []).forEach(node => {
    html += `
      <div class="svc-item">
        <span class="svc-dot ${node.status}"></span>
        <span class="svc-name">${node.name}</span>
        <span class="svc-port">${node.host}</span>
      </div>
    `;
  });

  // Group tmux sessions by machine
  const tmuxByMachine = {};
  (s.tmux_sessions || []).forEach(sess => {
    const m = sess.machine || 'local';
    if (!tmuxByMachine[m]) tmuxByMachine[m] = [];
    tmuxByMachine[m].push(sess);
  });

  Object.entries(tmuxByMachine).forEach(([machine, sessions]) => {
    html += `<div class="section-divider">Tmux — ${machine}</div>`;
    sessions.forEach(sess => {
      // Match agent by tmux_session field (handles "claw:0" style)
      const mappedAgent = state.agents.find(a => a.tmux_session === sess.name);
      const agentLabel = mappedAgent
        ? `<span style="font-size:9px;color:var(--accent)">${mappedAgent.name}</span>`
        : '<span style="font-size:9px;color:var(--text-dim);opacity:0.5">—</span>';
      html += `
        <div class="tmux-item">
          <span class="tmux-dot ${sess.attached ? 'attached' : ''}"></span>
          <span style="flex:1">${sess.name}${sess.windows > 1 ? ' ('+sess.windows+'w)' : ''}</span>
          ${agentLabel}
          <span style="font-size:9px;color:var(--text-dim);margin-left:4px">${sess.attached ? 'on' : 'off'}</span>
        </div>
      `;
    });
  });

  // Loaded models
  const models = s.loaded_models || [];
  if (models.length > 0) {
    html += '<div class="section-divider">Active Models</div>';
    models.forEach(m => {
      html += `
        <div class="svc-item">
          <span class="svc-dot up"></span>
          <span class="svc-name" style="font-size:10px">${m.name}</span>
          <span class="svc-port">${m.machine}</span>
        </div>
      `;
    });
  }

  if (s.timestamp) {
    html += `
      <div style="padding:8px 14px;font-size:9px;color:var(--text-dim);text-align:right">
        Updated ${new Date(s.timestamp * 1000).toLocaleTimeString()}
      </div>
    `;
  }

  el.innerHTML = html;
}

// --- Render: Events / Stream ---
function renderEvents() {
  const feed = document.getElementById('stream-feed');
  feed.innerHTML = '';
  state.eventCount = state.events.length;
  state.events.forEach(e => addStreamEvent(e, false));
  feed.scrollTop = feed.scrollHeight;
  document.getElementById('event-count').textContent = state.eventCount;
}

function addStreamEvent(e, scroll = true) {
  const feed = document.getElementById('stream-feed');
  const typeClass = e.event_type.startsWith('task') ? 'task'
    : e.event_type.startsWith('agent') ? 'agent'
    : e.event_type.startsWith('file') ? 'file'
    : 'system';

  const time = formatTime(e.timestamp);
  const desc = formatEventDesc(e);

  const div = document.createElement('div');
  div.className = 'event-item';
  div.onclick = () => div.classList.toggle('expanded');
  div.innerHTML = `
    <span class="event-time">${time}</span>
    <span class="event-type ${typeClass}">${e.event_type}</span>
    ${desc}
    <div class="event-detail">${JSON.stringify(e.payload, null, 2)}</div>
  `;
  feed.appendChild(div);
  if (scroll) feed.scrollTop = feed.scrollHeight;
}

function addStreamItem(type, text, timestamp) {
  const feed = document.getElementById('stream-feed');
  const div = document.createElement('div');
  div.className = 'event-item';
  div.innerHTML = `
    <span class="event-time">${formatTime(timestamp)}</span>
    <span class="event-type ${type}">${text}</span>
  `;
  feed.appendChild(div);
  feed.scrollTop = feed.scrollHeight;
}

function addRoutingResult(data) {
  const feed = document.getElementById('stream-feed');
  const div = document.createElement('div');
  div.className = 'event-item routing-result';

  if (data.error) {
    div.innerHTML = `<span class="event-type command">Error:</span> ${data.error}`;
  } else if (data.type === 'status') {
    const agentList = data.agents.map(a => {
      const dot = a.alive ? '\u25cf' : '\u25cb';
      return `${dot} ${a.name} (${a.cli_type}) — ${a.alive ? a.status : 'no heartbeat'}`;
    }).join('<br>');
    div.innerHTML = `<span class="event-type command">Status:</span><br>${agentList}`;
  } else {
    const alts = (data.alternatives || []).map(a =>
      `${a.name}: ${(a.score * 100).toFixed(0)}%`
    ).join(', ');

    const tc = data.task_class || '';
    const conf = data.class_confidence ? `${(data.class_confidence * 100).toFixed(0)}%` : '';
    const team = data.team || '';

    div.innerHTML = `
      <div>
        <span class="event-type command">Routed:</span>
        "${data.description}"
      </div>
      <div style="margin-top:4px">
        &rarr; <strong>${data.routed_to.name}</strong>
        <span class="score">${(data.routed_to.score * 100).toFixed(0)}%</span>
        match ${data.delivered ? '(delivered)' : '(not delivered)'}
      </div>
      <div style="font-size:10px;color:var(--text-dim);margin-top:2px">
        ${tc ? `Class: <span style="color:var(--cyan)">${tc}</span> (${conf})` : ''}
        ${team ? ` | Team: <span style="color:var(--accent)">${team}</span>` : ''}
        ${data.model_tier ? ` | Tier: ${data.model_tier}` : ''}
      </div>
      <div style="font-size:10px;color:var(--text-dim);margin-top:1px">
        Tags: ${(data.capability_tags || []).join(', ')}
        ${alts ? ` | Also: ${alts}` : ''}
      </div>
    `;
  }

  feed.appendChild(div);
  feed.scrollTop = feed.scrollHeight;
}

function addAgentMessage(data) {
  const feed = document.getElementById('stream-feed');
  const agent = state.agents.find(a => a.agent_id === data.agent_id);
  const name = agent ? agent.name : data.agent_id;
  const div = document.createElement('div');
  div.className = `event-item agent-msg ${data.msg_type || 'insight'}`;
  div.innerHTML = `
    <div class="msg-sender">
      <span class="event-time">${formatTime(new Date(data.timestamp * 1000).toISOString())}</span>
      ${name}
    </div>
    <div class="msg-text">${escapeHtml(data.text)}</div>
  `;
  feed.appendChild(div);
  feed.scrollTop = feed.scrollHeight;
}

function addTaskReport(data) {
  const feed = document.getElementById('stream-feed');
  const agent = state.agents.find(a => a.agent_id === data.agent_id);
  const name = agent ? agent.name : data.agent_id;
  const div = document.createElement('div');
  div.className = `event-item task-report ${data.status}`;
  const icon = data.status === 'completed' ? '\u2713' : '\u2717';
  div.innerHTML = `
    <span class="event-time">${formatTime(new Date(data.timestamp * 1000).toISOString())}</span>
    <strong>${icon} ${name}</strong> ${data.status} task ${data.task_id}
    ${data.summary ? `<div style="font-size:11px;margin-top:3px;color:var(--text-dim)">${escapeHtml(data.summary)}</div>` : ''}
  `;
  feed.appendChild(div);
  feed.scrollTop = feed.scrollHeight;
}

function escapeHtml(s) {
  const el = document.createElement('span');
  el.textContent = s;
  return el.innerHTML;
}

function formatEventDesc(e) {
  const p = e.payload || {};
  if (e.event_type === 'task.created') return `Task: ${(p.description || p.task_id || '').slice(0, 80)}`;
  if (e.event_type === 'task.claimed') return `${p.agent || ''} claimed ${p.task_id || ''}`;
  if (e.event_type === 'task.completed') return `${p.agent || ''} completed ${p.task_id || ''}`;
  if (e.event_type === 'task.failed') return `${p.agent || ''} FAILED ${p.task_id || ''}`;
  if (e.event_type === 'agent.started') return `${p.agent || ''} started`;
  if (e.event_type === 'agent.stopped') return `${p.agent || ''} stopped`;
  if (e.event_type === 'agent.message') return `${escapeHtml((p.text || '').slice(0, 100))}`;
  return JSON.stringify(p).slice(0, 80);
}

function formatTime(ts) {
  if (!ts) return '';
  try {
    const d = new Date(ts);
    if (isNaN(d.getTime())) return ts.slice(11, 19) || '';
    return d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  } catch { return ''; }
}

// --- Render: Pulse ---
function renderPulse() {
  const el = document.getElementById('pulse-content');
  const p = state.pulse;
  const neo = p.neo4j || {};

  el.innerHTML = `
    <div class="pulse-section">
      <div class="pulse-label">Knowledge Graph</div>
      ${neo.error
        ? `<div class="pulse-value error">Neo4j: ${neo.error}</div>`
        : `
          <div class="pulse-row"><span>Projects</span><span class="val">${fmt(neo.projects)}</span></div>
          <div class="pulse-row"><span>Phases</span><span class="val">${fmt(neo.phases)}</span></div>
          <div class="pulse-row"><span>Tasks</span><span class="val">${fmt(neo.tasks)}</span></div>
        `
      }
    </div>

    <div class="pulse-section">
      <div class="pulse-label">Infrastructure</div>
      <div class="pulse-row"><span>Redis Keys</span><span class="val">${fmt(p.redis_keys)}</span></div>
      <div class="pulse-row"><span>Events</span><span class="val">${fmt(p.orch_events)}</span></div>
      <div class="pulse-row"><span>Task Stream</span><span class="val">${fmt(p.orch_tasks)}</span></div>
    </div>

    <div class="pulse-section">
      <div class="pulse-label">Active Platforms</div>
      <div class="platform-badges">
        ${(p.platform_sessions || []).map(pl =>
          `<span class="platform-badge active">${pl}</span>`
        ).join('') || '<span class="platform-badge">none active</span>'}
      </div>
    </div>

    <div class="pulse-section">
      <div class="pulse-label">Last Updated</div>
      <div style="font-size:10px;color:var(--text-dim)">
        ${p.timestamp ? new Date(p.timestamp * 1000).toLocaleTimeString() : 'never'}
      </div>
    </div>
  `;
}

function fmt(n) {
  if (n === undefined || n === null) return '-';
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return String(n);
}

// --- Command Input ---
const cmdInput = document.getElementById('command-input');

// Auto-resize textarea
cmdInput.addEventListener('input', () => {
  cmdInput.style.height = 'auto';
  cmdInput.style.height = Math.min(cmdInput.scrollHeight, 120) + 'px';
});

cmdInput.addEventListener('keydown', (e) => {
  // Enter sends, Shift+Enter inserts newline
  if (e.key === 'Enter' && !e.shiftKey && cmdInput.value.trim()) {
    e.preventDefault();
    const text = cmdInput.value.trim();
    cmdInput.value = '';
    cmdInput.style.height = 'auto';

    // Support @agent_id targeting
    let payload = { text };
    const atMatch = text.match(/^@(\S+)\s+([\s\S]*)/);
    if (atMatch) {
      payload = { text: atMatch[2], target_agent: atMatch[1] };
    }

    // Always use HTTP POST — more reliable than WS for commands
    fetch('/api/command', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    })
    .then(r => r.json())
    .then(data => {
      addRoutingResult(data);
      // Also push result via WS for other connected clients
      if (state.ws && state.connected) {
        state.ws.send(JSON.stringify({ type: 'ping' }));
      }
    })
    .catch(err => {
      addRoutingResult({ error: 'Failed to reach dashboard: ' + err.message });
    });
  }
});

// --- WS Status ---
function updateWSStatus(connected) {
  const dot = document.getElementById('ws-dot');
  const label = document.getElementById('ws-label');
  dot.className = `ws-dot ${connected ? 'connected' : 'disconnected'}`;
  label.textContent = connected ? 'live' : 'reconnecting';
}

// --- Keepalive ---
setInterval(() => {
  if (state.ws && state.connected) {
    state.ws.send(JSON.stringify({ type: 'ping' }));
  }
}, 30000);

// --- Fleet Health ---
function refreshFleetHealth() {
  fetch('/api/fleet/health')
    .then(r => r.json())
    .then(data => {
      const el = document.getElementById('fleet-health');
      const a = data.agents || {};
      const t = data.tasks || {};
      const color = data.status === 'healthy' ? 'var(--green)' :
                    data.status === 'degraded' ? 'var(--yellow)' : 'var(--red)';
      el.innerHTML = `<span style="color:${color}">${a.alive}/${a.total}</span> agents`;
      if (t.active > 0) el.innerHTML += ` | ${t.active} active`;
      if (t.queued > 0) el.innerHTML += ` | ${t.queued} queued`;
      const cap = data.capacity || {};
      if (cap.claude) el.innerHTML += ` | Claude: ${cap.claude}`;
    })
    .catch(() => {
      document.getElementById('fleet-health').textContent = 'fleet: ?';
    });
}
refreshFleetHealth();
setInterval(refreshFleetHealth, 30000);

// --- Usage Guide (? key) ---

  if (e.key === '?' && document.activeElement.tagName !== 'INPUT') {
    toggleHelp();
  }
  if (e.key === 'Escape') {
    const overlay = document.getElementById('help-overlay');
    if (overlay) overlay.remove();
  }
});

        <div><code style="color:var(--green)">isma "query"</code> — Search ISMA knowledge graph</div>
        <div><code style="color:var(--green)">isma-context "task"</code> — Get context before work</div>
      </div>
      <div style="margin-bottom:12px">
        <div style="color:var(--cyan);font-weight:600;margin-bottom:4px">Dashboard Input (below)</div>
        <div>Type a task → auto-routed via LVP scoring</div>
        <div><code style="color:var(--green)">@agent-id task</code> — Target specific agent</div>
      </div>
      <div style="margin-bottom:12px">
        <div style="color:var(--cyan);font-weight:600;margin-bottom:4px">Task Classes</div>
        <div>QUICK_FIX → Sonnet/Codex | DEEP_REASONING → Opus</div>
        <div>TRAINING_GEN → ChatGPT/Gemini | RESEARCH → Perplexity/Gemini</div>
        <div>CONSULTATION → All 5 Family | STANDARD_CODE → Any</div>
      </div>
      <div style="margin-bottom:12px">

        <div><span style="color:var(--accent)">training</span> — CPT/SFT/DPO data generation</div>
        <div><span style="color:var(--accent)">infra</span> — Conductor, deployment, monitoring</div>
        <div><span style="color:var(--accent)">research</span> — Deep research (always-on)</div>
        <div><span style="color:var(--accent)">code</span> — General tasks, bug fixes</div>

  `;
